name: ✨ Feature Request
description: Suggest an idea or improvement for the app
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea! Please check for [existing feature requests](https://github.com/Dhalion/Tipinuss/issues?q=is%3Aissue+is%3Aopen+label%3Aenhancement) first.

  - type: textarea
    attributes:
      label: ❓ The Problem
      description: What's missing or frustrating? What are you trying to achieve?
      placeholder: "I'm always frustrated when I need to …"
    validations:
      required: true

  - type: textarea
    attributes:
      label: 💡 Proposed Solution
      description: How would you like it to work?
      placeholder: "It would be great if there was a way to …"
    validations:
      required: true

  - type: textarea
    attributes:
      label: 🔄 Alternatives
      description: What workarounds or alternatives have you considered?

  - type: dropdown
    attributes:
      label: 🎯 Area
      options:
        - Auth (Login / Registration / 2FA)
        - Account (Profile / Balance)
        - Betting (Bets / Results)
        - Admin
        - UI / Design
        - Other
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: 🤝 Contribution
      description: Would you like to help implement this?
      options:
        - label: I'm willing to submit a PR for this feature
