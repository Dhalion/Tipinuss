name: Deploy

on:
  workflow_call:
    inputs:
      stage:
        description: 'Deployer stage (production or staging)'
        type: string
        required: true

concurrency:
  group: deploy-${{ inputs.stage }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.stage }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies & build Vite assets
        run: |
          bun install --frozen-lockfile
          composer install --no-dev --no-interaction
          composer dump-autoload --no-dev --classmap-authoritative
          bun run build

      - name: Generate version file (includes build number)
        run: |
          COMMIT="${{ github.sha }}"
          DATE="${{ github.event.head_commit.timestamp }}"
          DATE="${DATE:-$(date +%Y-%m-%d)}"
          mkdir -p config
          echo "<?php return ['commit' => '${COMMIT:0:7}', 'date' => '${DATE:0:10}'];" > config/version.php

      - name: Install Deployer
        run: |
          curl -LO https://deployer.org/deployer.phar
          chmod +x deployer.phar
          sudo mv deployer.phar /usr/local/bin/dep

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p ${{ secrets.DEPLOY_PORT }} "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: dep deploy ${{ inputs.stage }} -vv
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_DATE: ${{ github.event.head_commit.timestamp || '' }}
